<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amisty POS - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/glow.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="index.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- Floating Orbs Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="login-page">
        <!-- Floating Card -->
        <div class="floating-card">
            <div class="card-shine"></div>
            
            <!-- Logo Section -->
            <div class="card-logo">
                <div class="logo-ring">
                    <div class="logo-inner">
                        <span class="logo-letter">A</span>
                    </div>
                </div>
            </div>

            <!-- Brand -->
            <div class="card-brand">
                <h1 class="brand-title">Amisty POS</h1>
                <p class="brand-sub">Smart Business Management</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input 
                        type="email" 
                        id="email" 
                        class="input-field" 
                        placeholder="Email Address"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field" 
                        placeholder="Password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" id="passwordToggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <!-- Error Message -->
                <div class="error-box" id="errorMessage" style="display: none;">
                    <span class="error-icon">⚠️</span>
                    <span class="error-text"></span>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn" id="loginButton">
                    <span class="btn-content">
                        <span class="btn-text">Sign In</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </span>
                    <span class="btn-loader" style="display: none;">
                        <span class="loader-dot"></span>
                    </span>
                </button>
            </form>

            <!-- Hint -->
            <p class="login-hint">Default: admin@amisty.com / admin123</p>
        </div>

        <!-- Footer -->
        <p class="page-footer">&copy; 2026 Amisty POS</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/animations.js"></script>
    <script src="index.js"></script>
</body>
</html>
